apiVersion: v1
kind: ConfigMap
metadata:
  name: pokus-ewg-config
  labels:
    app: pokus-ewg
data:
  # Quarkus will look for application.properties in QUARKUS_CONFIG_LOCATIONS
  application.properties: |
    # Override/custom properties for k8s
    app.random=nr2
    
    # Point the application to the in-cluster Kafka Service
    # The kafka Service is created by helm/kafka.yaml and exposes port 9092
    mp.messaging.connector.smallrye-kafka.bootstrap.servers=kafka:9092
